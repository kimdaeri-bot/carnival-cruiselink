<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>호텔 검색 - 크루즈링크</title>
  <meta name="description" content="전 세계 230만+ 호텔을 최저가로 검색하세요. 크루즈링크 호텔 예약 서비스.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
  <style>
    /* ===== 호텔 페이지 전용 스타일 ===== */
    .hotel-hero {
      background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
      padding: 60px 0 40px;
      text-align: center;
      color: #fff;
    }
    .hotel-hero h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; }
    .hotel-hero p { font-size: 1.05rem; opacity: 0.85; margin-bottom: 32px; }

    /* 검색 폼 */
    .hotel-search-box {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .hotel-search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .hotel-search-field {
      flex: 1;
      min-width: 160px;
    }
    .hotel-search-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .hotel-search-field input,
    .hotel-search-field select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a237e;
      background: #fafafa;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .hotel-search-field input:focus,
    .hotel-search-field select:focus {
      outline: none;
      border-color: #1a237e;
      background: #fff;
    }
    .hotel-search-field.dest-field { flex: 2; min-width: 220px; position: relative; }

    /* 자동완성 드롭다운 */
    .autocomplete-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      z-index: 100;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }
    .autocomplete-dropdown.open { display: block; }
    .ac-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      border-bottom: 1px solid #f5f5f5;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: #f0f4ff; }
    .ac-item-icon { font-size: 1.1rem; }
    .ac-item-name { font-weight: 600; color: #1a237e; }
    .ac-item-sub { font-size: 0.78rem; color: #888; }

    /* 게스트 선택 */
    .guests-picker {
      position: relative;
    }
    .guests-display {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      background: #fafafa;
      color: #1a237e;
      user-select: none;
      white-space: nowrap;
    }
    .guests-display:hover { border-color: #1a237e; }
    .guests-panel {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 16px;
      z-index: 100;
      width: 220px;
      display: none;
    }
    .guests-panel.open { display: block; }
    .guests-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .guests-row:last-child { margin-bottom: 0; }
    .guests-label { font-size: 0.88rem; font-weight: 600; }
    .guests-sub { font-size: 0.75rem; color: #888; }
    .guests-ctrl { display: flex; align-items: center; gap: 10px; }
    .guests-btn {
      width: 28px; height: 28px;
      border: 1.5px solid #ddd;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      color: #1a237e;
    }
    .guests-btn:hover { border-color: #1a237e; background: #f0f4ff; }
    .guests-count { font-weight: 700; font-size: 0.95rem; min-width: 18px; text-align: center; }

    /* 검색 버튼 */
    .hotel-search-btn {
      background: #ff6f00;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      height: 44px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }
    .hotel-search-btn:hover { background: #e65100; transform: translateY(-1px); }
    .hotel-search-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    /* 결과 섹션 */
    .results-section { padding: 40px 0 60px; background: #f8f9fc; min-height: 400px; }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .results-count { font-size: 1.05rem; font-weight: 700; color: #1a237e; }
    .results-sort {
      padding: 8px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #333;
    }

    /* 호텔 카드 그리드 */
    .hotel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .hotel-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .hotel-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.13); transform: translateY(-2px); }
    .hotel-card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #e8eaf6, #c5cae9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .hotel-card-img img { width: 100%; height: 180px; object-fit: cover; }
    .hotel-card-body { padding: 16px; }
    .hotel-card-stars { color: #ffc107; font-size: 0.88rem; margin-bottom: 4px; }
    .hotel-card-name { font-size: 1rem; font-weight: 700; color: #1a237e; margin-bottom: 4px; line-height: 1.35; }
    .hotel-card-loc { font-size: 0.82rem; color: #888; margin-bottom: 10px; }
    .hotel-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }
    .hotel-card-price { }
    .hotel-card-price-from { font-size: 0.75rem; color: #888; }
    .hotel-card-price-val { font-size: 1.15rem; font-weight: 900; color: #ff6f00; }
    .hotel-card-price-night { font-size: 0.75rem; color: #888; }
    .hotel-card-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .hotel-card-btn {
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .hotel-card-btn:hover { background: #283593; }

    /* 상태 메시지 */
    .hotel-status {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .hotel-status .status-icon { font-size: 3rem; margin-bottom: 16px; }
    .hotel-status h3 { font-size: 1.2rem; color: #444; margin-bottom: 8px; }
    .hotel-status p { font-size: 0.9rem; }

    /* 로딩 스피너 */
    .hotel-spinner {
      text-align: center;
      padding: 60px;
    }
    .spin {
      width: 48px; height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a237e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 페이지네이션 */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
    }
    .page-btn {
      padding: 8px 14px;
      border: 1.5px solid #e0e0e0;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-family: inherit;
      color: #333;
    }
    .page-btn.active { background: #1a237e; color: #fff; border-color: #1a237e; }
    .page-btn:hover:not(.active) { border-color: #1a237e; color: #1a237e; }

    /* 모달 */
    .hotel-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    .hotel-modal-overlay.open { display: flex; }
    .hotel-modal {
      background: #fff;
      border-radius: 16px;
      max-width: 640px;
      width: 100%;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .hotel-modal-header {
      position: relative;
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: #fff;
      padding: 24px;
    }
    .hotel-modal-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,0.2);
      border: none; border-radius: 50%;
      width: 32px; height: 32px;
      cursor: pointer; color: #fff; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
    }
    .hotel-modal-body { padding: 24px; }

    /* 크루즈 연계 배너 */
    .cruise-link-banner {
      background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
      color: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .cruise-link-banner h4 { font-size: 1rem; margin-bottom: 4px; }
    .cruise-link-banner p { font-size: 0.83rem; opacity: 0.85; }

    /* 반응형 */
    @media (max-width: 600px) {
      .hotel-hero h1 { font-size: 1.6rem; }
      .hotel-search-row { flex-direction: column; }
      .hotel-search-field { min-width: 100%; }
      .hotel-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="header"></div>

<!-- 히어로 + 검색 -->
<section class="hotel-hero">
  <div class="container">
    <span class="hero-badge">🏨 전 세계 230만+ 호텔</span>
    <h1>원하는 호텔을 바로 찾으세요</h1>
    <p>크루즈 전후 숙박부터 비즈니스 출장까지 — 최저가 호텔 검색</p>

    <div class="hotel-search-box">
      <div class="hotel-search-row">
        <!-- 목적지 -->
        <div class="hotel-search-field dest-field" id="destField">
          <label>목적지 / 호텔명</label>
          <input type="text" id="destInput" placeholder="도시, 지역 또는 호텔명 입력" autocomplete="off" oninput="onDestInput(this.value)" onfocus="onDestInput(this.value)">
          <div class="autocomplete-dropdown" id="acDropdown"></div>
        </div>

        <!-- 체크인 -->
        <div class="hotel-search-field">
          <label>체크인</label>
          <input type="date" id="checkinInput">
        </div>

        <!-- 체크아웃 -->
        <div class="hotel-search-field">
          <label>체크아웃</label>
          <input type="date" id="checkoutInput">
        </div>

        <!-- 인원 -->
        <div class="hotel-search-field">
          <label>인원</label>
          <div class="guests-picker" id="guestsPicker">
            <div class="guests-display" id="guestsDisplay" onclick="toggleGuestsPanel()">성인 2명</div>
            <div class="guests-panel" id="guestsPanel">
              <div class="guests-row">
                <div>
                  <div class="guests-label">성인</div>
                  <div class="guests-sub">만 12세 이상</div>
                </div>
                <div class="guests-ctrl">
                  <button class="guests-btn" onclick="changeGuests('adults', -1)">−</button>
                  <span class="guests-count" id="adultsCount">2</span>
                  <button class="guests-btn" onclick="changeGuests('adults', 1)">+</button>
                </div>
              </div>
              <div class="guests-row">
                <div>
                  <div class="guests-label">아동</div>
                  <div class="guests-sub">만 2~11세</div>
                </div>
                <div class="guests-ctrl">
                  <button class="guests-btn" onclick="changeGuests('children', -1)">−</button>
                  <span class="guests-count" id="childrenCount">0</span>
                  <button class="guests-btn" onclick="changeGuests('children', 1)">+</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 검색 버튼 -->
        <button class="hotel-search-btn" id="searchBtn" onclick="doSearch()">🔍 검색</button>
      </div>
    </div>
  </div>
</section>

<!-- 결과 영역 -->
<section class="results-section">
  <div class="container">
    <div id="resultsArea">
      <!-- 초기 안내 -->
      <div class="hotel-status">
        <div class="status-icon">🏨</div>
        <h3>호텔을 검색해 보세요</h3>
        <p>목적지와 날짜를 입력하고 검색 버튼을 클릭하세요</p>
        <div style="margin-top:24px">
          <p style="font-size:0.85rem;color:#aaa;margin-bottom:12px">인기 목적지</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
            <button onclick="quickSearch('Paris','파리')" style="padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:0.88rem">🗼 파리</button>
            <button onclick="quickSearch('Tokyo','도쿄')" style="padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:0.88rem">🗾 도쿄</button>
            <button onclick="quickSearch('Barcelona','바르셀로나')" style="padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:0.88rem">🏖 바르셀로나</button>
            <button onclick="quickSearch('New York','뉴욕')" style="padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:0.88rem">🗽 뉴욕</button>
            <button onclick="quickSearch('Rome','로마')" style="padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:0.88rem">🏛 로마</button>
            <button onclick="quickSearch('Dubai','두바이')" style="padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:0.88rem">🏙 두바이</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- 크루즈+호텔 연계 배너 -->
<section style="padding:0 0 60px;background:#f8f9fc">
  <div class="container">
    <div class="cruise-link-banner">
      <div>
        <h4>🚢 크루즈 + 호텔 패키지</h4>
        <p>크루즈 승선 전후 숙박까지 한번에 해결하세요. 전문 상담원이 최적의 패키지를 구성해 드립니다.</p>
      </div>
      <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange btn-sm" style="white-space:nowrap">💬 패키지 상담</a>
    </div>
  </div>
</section>

<!-- 호텔 상세 모달 -->
<div class="hotel-modal-overlay" id="hotelModal" onclick="closeModal(event)">
  <div class="hotel-modal">
    <div class="hotel-modal-header">
      <button class="hotel-modal-close" onclick="document.getElementById('hotelModal').classList.remove('open')">✕</button>
      <div id="modalStars" style="font-size:0.9rem;margin-bottom:6px"></div>
      <h2 id="modalName" style="font-size:1.3rem;margin:0 0 6px"></h2>
      <div id="modalLoc" style="font-size:0.85rem;opacity:0.8"></div>
    </div>
    <div class="hotel-modal-body" id="modalBody"></div>
  </div>
</div>

<div id="footer"></div>

<script src="assets/js/components.js"></script>
<script src="assets/js/api.js"></script>
<script>
// ===== 초기화 =====
document.getElementById('header').innerHTML = Components.header('hotels');
document.getElementById('footer').innerHTML = Components.footer();

// 기본 날짜 설정 (내일 ~ 모레)
const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
const dayAfter = new Date(); dayAfter.setDate(dayAfter.getDate() + 3);
document.getElementById('checkinInput').value = fmt(tomorrow);
document.getElementById('checkoutInput').value = fmt(dayAfter);
document.getElementById('checkinInput').min = fmt(tomorrow);
document.getElementById('checkoutInput').min = fmt(dayAfter);
document.getElementById('checkinInput').addEventListener('change', function() {
  const ci = new Date(this.value);
  ci.setDate(ci.getDate() + 1);
  document.getElementById('checkoutInput').min = fmt(ci);
  if (document.getElementById('checkoutInput').value <= this.value) {
    document.getElementById('checkoutInput').value = fmt(ci);
  }
});

function fmt(d) { return d.toISOString().split('T')[0]; }

// ===== 인원 선택 =====
const guests = { adults: 2, children: 0 };
function changeGuests(type, delta) {
  if (type === 'adults') {
    guests.adults = Math.max(1, Math.min(8, guests.adults + delta));
    document.getElementById('adultsCount').textContent = guests.adults;
  } else {
    guests.children = Math.max(0, Math.min(4, guests.children + delta));
    document.getElementById('childrenCount').textContent = guests.children;
  }
  let txt = `성인 ${guests.adults}명`;
  if (guests.children > 0) txt += ` · 아동 ${guests.children}명`;
  document.getElementById('guestsDisplay').textContent = txt;
}
function toggleGuestsPanel() {
  document.getElementById('guestsPanel').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('guestsPicker').contains(e.target)) {
    document.getElementById('guestsPanel').classList.remove('open');
  }
  if (!document.getElementById('destField').contains(e.target)) {
    document.getElementById('acDropdown').classList.remove('open');
  }
});

// ===== 자동완성 =====
let acTimer = null;
let selectedRegion = null; // { id, name, type }

async function onDestInput(val) {
  clearTimeout(acTimer);
  if (val.length < 2) {
    document.getElementById('acDropdown').classList.remove('open');
    return;
  }
  acTimer = setTimeout(() => fetchSuggest(val), 350);
}

async function fetchSuggest(query) {
  try {
    const res = await fetch(`${PROXY_BASE}/suggest?q=${encodeURIComponent(query)}&lang=ko`);
    const data = await res.json();
    renderDropdown(data);
  } catch (e) {
    // 폴백: 인기 도시 목록에서 필터링
    renderDropdown(filterLocalCities(query));
  }
}

// 로컬 폴백 도시 목록
const LOCAL_CITIES = [
  { id: '2395', name: '파리', country: '프랑스', type: 'region', icon: '🗼' },
  { id: '2011', name: '로마', country: '이탈리아', type: 'region', icon: '🏛' },
  { id: '2734', name: '바르셀로나', country: '스페인', type: 'region', icon: '🏖' },
  { id: '6053839', name: '베를린', country: '독일', type: 'region', icon: '🏙' },
  { id: '2178', name: '런던', country: '영국', type: 'region', icon: '🎡' },
  { id: '2024', name: '뉴욕', country: '미국', type: 'region', icon: '🗽' },

function filterLocalCities(q) {
  const lower = q.toLowerCase();
  return LOCAL_CITIES.filter(c => 
    c.name.includes(q) || c.country.includes(q) || 
    c.name.toLowerCase().includes(lower)
  ).slice(0, 6);
}

// ===== 메인 검색 =====
const PROXY_BASE = 'https://hotel-proxy-nine.vercel.app/api';

async function doSearch() {
  const destVal = document.getElementById('destInput').value.trim();
  const checkin = document.getElementById('checkinInput').value;
  const checkout = document.getElementById('checkoutInput').value;

  if (!destVal) { alert('목적지를 입력해 주세요.'); return; }
  if (!checkin || !checkout) { alert('날짜를 선택해 주세요.'); return; }
  if (checkin >= checkout) { alert('체크아웃은 체크인보다 늦어야 합니다.'); return; }

  const region = selectedRegion || filterLocalCities(destVal)[0];

  showLoading();
  document.getElementById('searchBtn').disabled = true;

  try {
    const params = new URLSearchParams({
      region_id: region?.id || '2395',
      checkin,
      checkout,
      adults: guests.adults,
      children: guests.children,
      currency: 'KRW',
      language: 'ko'
    });

    const res = await fetch(`${PROXY_BASE}/search?${params}`);
    const data = await res.json();

    if (data.error) throw new Error(data.error);
    renderResults(data.hotels || [], destVal, checkin, checkout);
  } catch (e) {
    console.error('Search error:', e);
    showError(destVal);
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

// ===== 렌더링 =====
function showLoading() {
  document.getElementById('resultsArea').innerHTML = `
    <div class="hotel-spinner">

      <p style="color:#888">호텔 정보를 불러오는 중...</p>
    </div>`;
}

function showError(dest) {
  document.getElementById('resultsArea').innerHTML = `
    <div class="hotel-status">
      <div class="status-icon">⚠️</div>
      <h3>"${dest}" 검색 결과를 불러오지 못했습니다</h3>
      <p>잠시 후 다시 시도하거나 다른 목적지를 검색해 보세요.</p>
      <div style="margin-top:20px">
        <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange btn-sm">💬 카카오톡으로 직접 문의</a>
      </div>
    </div>`;
}

function renderResults(hotels, dest, checkin, checkout) {
  if (!hotels.length) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="hotel-status">
        <div class="status-icon">🔍</div>
        <h3>"${dest}" 검색 결과가 없습니다</h3>
        <p>날짜나 인원을 변경하거나 다른 목적지를 검색해 보세요.</p>
      </div>`;
    return;
  }

  const nights = Math.round((new Date(checkout) - new Date(checkin)) / 86400000);
  const html = `
    <div class="results-header">
      <div class="results-count">🏨 <strong>${dest}</strong> · ${hotels.length}개 호텔 검색됨 · ${checkin} ~ ${checkout} (${nights}박)</div>
      <select class="results-sort" onchange="sortResults(this.value)">
        <option value="price">가격순</option>
        <option value="stars">성급순</option>
        <option value="name">이름순</option>
      </select>
    </div>
    <div class="hotel-grid" id="hotelGrid">
      ${hotels.map(h => hotelCard(h, nights)).join('')}
    </div>`;

  document.getElementById('resultsArea').innerHTML = html;
}

function hotelCard(h, nights) {
  const stars = '⭐'.repeat(Math.min(5, h.stars || 3));
  const price = h.minPrice ? formatPrice(h.minPrice, h.currency) : '가격 확인 필요';
  const img = h.images?.[0] || '';

  return `
    <div class="hotel-card" onclick="openModal(${JSON.stringify(h).replace(/"/g,'&quot;')}, ${nights})">
      <div class="hotel-card-img">
        ${img
          ? `<img src="${img}" alt="${h.name}" loading="lazy" onerror="this.style.display='none'">`
          : '🏨'}
      </div>
      <div class="hotel-card-body">
        <div class="hotel-card-stars">${stars} ${h.stars ? h.stars + '성급' : ''}</div>
        <div class="hotel-card-name">${h.name}</div>
        <div class="hotel-card-loc">📍 ${h.region || h.address || ''}</div>
        <div class="hotel-card-footer">
          <div class="hotel-card-price">
            <div class="hotel-card-price-from">1박 기준</div>
            <div class="hotel-card-price-val">${price}</div>
          </div>
          <button class="hotel-card-btn">예약 보기</button>
        </div>
      </div>
    </div>`;
}

  const price = h.minPrice ? formatPrice(h.minPrice, h.currency) : null;

  document.getElementById('modalBody').innerHTML = `

      ? `<img src="${h.images[0]}" style="width:100%;height:220px;object-fit:cover;border-radius:8px;margin-bottom:16px" onerror="this.style.display='none'">`

    </div>
    ${price ? `

      <div>
        <div style="font-size:0.8rem;color:#888">1박 최저가 (${nights}박 기준)</div>
        <div style="font-size:1.4rem;font-weight:900;color:#ff6f00">${price}</div>
      </div>
      <div style="font-size:0.8rem;color:#888">${nights}박 총 ${formatPrice(h.minPrice * nights, h.currency)}</div>
    </div>` : ''}
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${h.bookUrl
        ? `<a href="${h.bookUrl}" target="_blank" class="btn btn-orange" style="flex:1;text-align:center;text-decoration:none">🔗 지금 예약하기</a>`
        : `<a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange" style="flex:1;text-align:center;text-decoration:none">💬 예약 문의</a>`}
      <a href="tel:02-3788-9119" class="btn btn-navy" style="flex:1;text-align:center;text-decoration:none">📞 전화 상담</a>
    </div>`;

  document.getElementById('hotelModal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('hotelModal')) {
    document.getElementById('hotelModal').classList.remove('open');

}

// ===== 유틸 =====
function formatPrice(amount, currency) {
  if (!amount) return '-';
  const cur = currency || 'KRW';
  if (cur === 'KRW') return '₩' + Math.round(amount).toLocaleString('ko-KR');
  if (cur === 'USD') return '$' + Number(amount).toFixed(2);
  if (cur === 'EUR') return '€' + Number(amount).toFixed(2);
  return amount + ' ' + cur;
}
